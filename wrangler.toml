# Cloudflare Pages configuration. Secrets (DEEPSEEK_API_KEY etc.) are still
# set via the Pages dashboard — this file only pins runtime compatibility
# so Pages Functions can load Node-flavoured modules.
#
# "name" must match the Pages project slug shown in the Cloudflare dashboard
# (Workers & Pages → your project). Update if it differs.
name = "acoffeemeetup"
compatibility_date = "2026-04-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 binding — dev database. The `database_id` is filled in after running
# `wrangler d1 create acoffee-dev`. Migrations live alongside the schema.
[[d1_databases]]
binding = "DB"
database_name = "acoffee-dev"
database_id = "237b2a39-340b-4d34-a9b6-947358a17ef9"
migrations_dir = "functions/_lib/db/migrations"

# KV cache for Google Routes API responses. Per-pair (origin, destination, mode)
# caching with a 1h TTL — cuts repeat-search cost to zero. Cheap (~free at our
# scale) and Workers KV reads are sub-ms, so the wrap is essentially free.
[[kv_namespaces]]
binding = "ROUTES_CACHE"
id = "11461dbc572d492a9f101e65b19f32f1"

# R2 bucket for user-uploaded avatar images. Shared by dev + prod because
# keys are user-id-prefixed and the dev/prod D1s have disjoint user IDs,
# so collision is impossible. Public access is on at the bucket level —
# the r2.dev URL is what we store in user.image and serve to browsers.
# AVATARS_PUBLIC_URL env var holds the bucket's public URL prefix.
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "acoffee-avatars"

# R2 bucket for cached Google Places photos. Different lifecycle from
# avatars (purely a server-side cache, no user control), so it gets its
# own bucket. Public access via r2.dev URL; the proxy endpoint at
# /api/places/photo/[placeId] writes here on cache miss and 302s
# subsequent loads directly to the public URL.
[[r2_buckets]]
binding = "PLACE_PHOTOS"
bucket_name = "acoffee-place-photos"

[vars]
AVATARS_PUBLIC_URL = "https://pub-8047aed0e1084fc3b99f34b3bb637d65.r2.dev"
# Filled in after `wrangler r2 bucket dev-url enable acoffee-place-photos`.
# Until that command runs the bucket has no public URL and the proxy
# endpoint will return 503 with a clear error.
PLACE_PHOTOS_PUBLIC_URL = ""

# Production D1 — separate database, same binding name. Set via
# `wrangler d1 create acoffee-prod` and paste the id below.
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "acoffee-prod"
database_id = "7f9083bb-6e58-44dd-a360-4879e0509f0e"
migrations_dir = "functions/_lib/db/migrations"

[[env.production.kv_namespaces]]
binding = "ROUTES_CACHE"
id = "1ddd7e859cab4dcebebd0eb40704a53e"

[[env.production.r2_buckets]]
binding = "AVATARS"
bucket_name = "acoffee-avatars"

[[env.production.r2_buckets]]
binding = "PLACE_PHOTOS"
bucket_name = "acoffee-place-photos"

[env.production.vars]
AVATARS_PUBLIC_URL = "https://pub-8047aed0e1084fc3b99f34b3bb637d65.r2.dev"
PLACE_PHOTOS_PUBLIC_URL = ""
