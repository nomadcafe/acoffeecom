# Triggers /api/cron/gc once a day so unconfirmed bookings don't pile
# up holding slots forever, and booking_attempts (rate-limit ledger)
# doesn't grow without bound.
#
# Reuses the CRON_SECRET repo secret already set up for monthly-recap.

name: Booking GC

on:
  schedule:
    # 04:00 UTC daily — low-traffic window for most timezones. GitHub
    # Actions cron is best-effort; ±a few minutes is fine for cleanup.
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/cron/gc
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set in repo secrets — abort." >&2
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://acoffee.com/api/cron/gc)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
